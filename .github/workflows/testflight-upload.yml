name: TestFlight Upload

on:
  workflow_run:
    workflows:
      - iOS Cloud Build
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  upload_testflight:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Upload Artifact To TestFlight
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set temporary paths
        run: |
          echo "IPA_DIR=$RUNNER_TEMP/testflight-ipa" >> "$GITHUB_ENV"
          echo "API_PRIVATE_KEYS_DIR=$RUNNER_TEMP/private_keys" >> "$GITHUB_ENV"

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: testflight-ipa-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ${{ env.IPA_DIR }}
          github-token: ${{ github.token }}

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$API_PRIVATE_KEYS_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Resolve IPA path
        run: |
          IPA_PATH=$(find "$IPA_DIR" -type f -name '*.ipa' | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in artifact download path: $IPA_DIR"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload To TestFlight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"