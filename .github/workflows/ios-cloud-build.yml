name: iOS Cloud Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-cloud-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift_package_tests:
    name: Swift Package Tests
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Swift version
        run: swift --version

      - name: Run package tests
        run: swift test --parallel

  ios_app_build:
    name: iOS App Build
    runs-on: macos-15
    needs: swift_package_tests
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install XcodeGen
        run: |
          brew untap aws/tap || true
          if brew tap | grep -q '^azure/bicep$'; then
            brew trust azure/bicep || true
          fi
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build iOS app
        run: |
          xcodebuild \
            -project TAC5Remote_iOS_App.xcodeproj \
            -scheme TAC5Remote_iOS_App \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            ENABLE_PREVIEWS=NO \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            build

  build_testflight_artifact:
    name: Build TestFlight Artifact
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    runs-on: macos-15
    needs: swift_package_tests
    timeout-minutes: 45
    env:
      APP_SCHEME: TAC5Remote_iOS_App
      APP_PROJECT: TAC5Remote_iOS_App.xcodeproj
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set temporary paths
        run: |
          echo "ARCHIVE_PATH=$RUNNER_TEMP/TAC5Remote_iOS_App.xcarchive" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$RUNNER_TEMP/testflight-export" >> "$GITHUB_ENV"
          echo "EXPORT_OPTIONS_PLIST=$RUNNER_TEMP/ExportOptions.plist" >> "$GITHUB_ENV"
          echo "API_PRIVATE_KEYS_DIR=$RUNNER_TEMP/private_keys" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: |
          brew untap aws/tap || true
          if brew tap | grep -q '^azure/bicep$'; then
            brew trust azure/bicep || true
          fi
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$API_PRIVATE_KEYS_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Create export options
        run: |
          cat > "$EXPORT_OPTIONS_PLIST" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>8Q774J3K2P</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive iOS app
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          xcodebuild \
            -project "$APP_PROJECT" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_PRIVATE_KEYS_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload TestFlight IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: testflight-ipa-${{ github.sha }}
          path: ${{ env.EXPORT_PATH }}/TAC5Remote_iOS_App.ipa
          if-no-files-found: error
