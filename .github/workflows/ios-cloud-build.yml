name: iOS Cloud Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-cloud-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift_package_tests:
    name: Swift Package Tests
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Swift version
        run: swift --version

      - name: Run package tests
        run: swift test --parallel

  ios_app_build:
    name: iOS App Build
    runs-on: macos-15
    needs: swift_package_tests
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install XcodeGen
        run: |
          brew untap aws/tap || true
          if brew tap | grep -q '^azure/bicep$'; then
            brew trust azure/bicep || true
          fi
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build iOS app
        run: |
          xcodebuild \
            -project TAC5Remote_iOS_App.xcodeproj \
            -scheme TAC5Remote_iOS_App \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build
